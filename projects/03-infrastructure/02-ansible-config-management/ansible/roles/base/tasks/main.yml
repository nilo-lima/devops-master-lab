---
- name: Atualizar cache de pacotes e aplicar upgrades seguros
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    cache_valid_time: 3600

- name: Instalar utilitários essenciais e fail2ban
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

# fail2ban está instalado mas não iniciado: exige capabilities de netfilter/iptables
# que não estão disponíveis em containers Docker sem --privileged.
# Em servidores reais, adicione: service: name=fail2ban state=started enabled=true

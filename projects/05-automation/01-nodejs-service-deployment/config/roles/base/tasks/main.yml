---
- name: Atualizar cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar pacotes base
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

- name: Adicionar chave GPG oficial do Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Adicionar repositório Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Instalar Docker CE
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Adicionar usuário ubuntu ao grupo docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Habilitar e iniciar Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Habilitar e iniciar Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

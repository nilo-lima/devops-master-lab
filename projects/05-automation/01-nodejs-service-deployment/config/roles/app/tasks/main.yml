---
- name: Clonar ou atualizar repositório
  ansible.builtin.git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_repo_dest }}"
    version: main
    force: true

- name: Construir imagem Docker
  ansible.builtin.command:
    cmd: docker build -t {{ app_image_name }} {{ app_repo_dest }}/{{ app_subdir }}
  changed_when: true

- name: Parar container existente (se houver)
  ansible.builtin.shell: docker stop {{ app_container_name }} 2>/dev/null || true
  changed_when: false

- name: Remover container existente (se houver)
  ansible.builtin.shell: docker rm {{ app_container_name }} 2>/dev/null || true
  changed_when: false

- name: Iniciar container Node.js
  ansible.builtin.command:
    cmd: docker run -d --name {{ app_container_name }} --restart always -p {{ app_port }}:{{ app_port }} {{ app_image_name }}
  changed_when: true

- name: Configurar Nginx como reverse proxy
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/nodejs-service
    mode: '0644'
  notify: Reload nginx

- name: Ativar site no Nginx
  ansible.builtin.file:
    src: /etc/nginx/sites-available/nodejs-service
    dest: /etc/nginx/sites-enabled/nodejs-service
    state: link
  notify: Reload nginx

- name: Remover site default do Nginx
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

---
- name: Clonar ou atualizar repositório
  ansible.builtin.git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_repo_dest }}"
    version: main
    force: true

- name: Construir imagem Docker
  community.docker.docker_image:
    name: "{{ app_image_name }}"
    build:
    path: "{{ app_repo_dest }}/{{ app_subdir }}"
    source: build
    force_source: true

- name: Parar e remover container existente (se houver)
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Iniciar container Node.js
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ app_image_name }}"
    state: started
    restart_policy: always
    ports:
      - "{{ app_port }}:{{ app_port }}"

- name: Configurar Nginx como reverse proxy
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/nodejs-service
    mode: '0644'
  notify: Reload nginx

- name: Ativar site no Nginx
  ansible.builtin.file:
    src: /etc/nginx/sites-available/nodejs-service
    dest: /etc/nginx/sites-enabled/nodejs-service
    state: link
  notify: Reload nginx

- name: Remover site default do Nginx
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

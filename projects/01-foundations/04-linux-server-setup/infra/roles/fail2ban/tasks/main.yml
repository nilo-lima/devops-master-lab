---
- name: Instalar Fail2Ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Aplicar configuracao customizada do jail
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban

- name: Ativar Fail2Ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

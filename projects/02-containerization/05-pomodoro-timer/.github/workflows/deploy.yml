name: Deploy Pomodoro → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'projects/02-containerization/05-pomodoro-timer/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/02-containerization/05-pomodoro-timer/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/02-containerization/05-pomodoro-timer/app/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
        env:
          VITE_BASE: /DevOps_Master_Lab/

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: projects/02-containerization/05-pomodoro-timer/app/dist
          destination_dir: pomodoro

name: Node.js Service — CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'projects/05-automation/01-nodejs-service-deployment/**'
      - '.github/workflows/nodejs-deploy.yml'

jobs:
  test:
    name: Testes e Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/05-automation/01-nodejs-service-deployment/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/05-automation/01-nodejs-service-deployment/app/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_NODE_SSH_KEY }}

      - name: Adicionar host ao known_hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Instalar Ansible
        run: pip install ansible

      - name: Criar inventário dinâmico
        run: |
          cat > projects/05-automation/01-nodejs-service-deployment/config/inventory/hosts.yml << INVENTORY
          all:
            hosts:
              nodejs_server:
                ansible_host: ${{ secrets.EC2_HOST }}
                ansible_user: ${{ secrets.EC2_USER }}
          INVENTORY

      - name: Executar playbook Ansible
        run: |
          cd projects/05-automation/01-nodejs-service-deployment/config
          ansible-playbook node_service.yml --tags app
